<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Miku Expansion Save System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); padding: 15px; border-radius: 20px;
            color: white; z-index: 100; text-align: center; width: 280px;
            border: 2px solid #00fff2; box-shadow: 0 0 20px rgba(0, 255, 242, 0.4);
        }
        .btns { display: flex; gap: 8px; margin-bottom: 10px; }
        .tgl {
            flex: 1; padding: 10px; background: #222; border-radius: 10px;
            cursor: pointer; font-size: 11px; border: 1px solid #444; color: #aaa;
        }
        .tgl.active { background: #00fff2; color: #000; font-weight: bold; }
        #mainBtn {
            width: 100%; padding: 15px; background: #ff007b; border: none;
            color: white; font-weight: bold; border-radius: 12px; font-size: 20px;
            cursor: pointer; box-shadow: 0 4px 0 #800;
        }
        #mainBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #800; }
        #resetBtn {
            margin-top: 10px; background: none; border: none; color: #555; 
            font-size: 10px; cursor: pointer; text-decoration: underline;
        }
        #stats { margin-top: 8px; color: #00fff2; font-size: 14px; font-family: monospace; }
    </style>
</head>
<body>

<div id="ui">
    <div class="btns">
        <div id="tChest" class="tgl active">ГРУДЬ</div>
        <div id="tButt" class="tgl">ПОПА</div>
    </div>
    <button id="mainBtn">КЛИК!</button>
    <div id="stats">РАЗМЕР: <span id="sizeVal">0</span></div>
    <button id="resetBtn">Сбросить прогресс</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls;
    let chestParts = [], buttParts = [], nipples = [];
    let chestSize = 0, buttSize = 0;
    let activeChest = true, activeButt = false;
    let milkParticles = [];

    // --- ФУНКЦИИ СОХРАНЕНИЯ ---
    function saveProgress() {
        localStorage.setItem('miku_chestSize', chestSize);
        localStorage.setItem('miku_buttSize', buttSize);
    }

    function loadProgress() {
        const savedChest = localStorage.getItem('miku_chestSize');
        const savedButt = localStorage.getItem('miku_buttSize');
        if (savedChest) chestSize = parseInt(savedChest);
        if (savedButt) buttSize = parseInt(savedButt);
        
        updateVisuals(); // Сразу применяем размеры к модели
    }

    function updateVisuals() {
        document.getElementById('sizeVal').innerText = Math.max(chestSize, buttSize);
        
        const sC = 1 + (chestSize * 0.07);
        chestParts.forEach(p => p.scale.set(sC, sC, sC));

        const sB = 1 + (buttSize * 0.07);
        buttParts.forEach(p => p.scale.set(sB, sB, sB));
    }

    // --- ИНИЦИАЛИЗАЦИЯ ИГРЫ ---
    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3.5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const direct = new THREE.DirectionalLight(0xffffff, 0.5);
        direct.position.set(5, 5, 5);
        scene.add(direct);

        const skinMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
        const nippleMat = new THREE.MeshPhongMaterial({ color: 0xffa0a0 });
        const hairMat = new THREE.MeshPhongMaterial({ color: 0x00fff2 });
        const clothMat = new THREE.MeshPhongMaterial({ color: 0x222222 });

        const miku = new THREE.Group();
        scene.add(miku);

        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 0.8, 20), clothMat);
        torso.position.y = 1;
        miku.add(torso);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.24, 24, 24), skinMat);
        head.position.y = 1.6;
        miku.add(head);

        const tailGeo = new THREE.CylinderGeometry(0.05, 0.02, 1.3, 12);
        const tL = new THREE.Mesh(tailGeo, hairMat);
        tL.position.set(-0.35, 1.6, -0.1); tL.rotation.z = 0.4;
        const tR = new THREE.Mesh(tailGeo, hairMat);
        tR.position.set(0.35, 1.6, -0.1); tR.rotation.z = -0.4;
        miku.add(tL, tR);

        const breastGeo = new THREE.SphereGeometry(0.12, 32, 32);
        const lB = new THREE.Mesh(breastGeo, skinMat);
        lB.position.set(-0.14, 1.25, 0.22);
        const rB = new THREE.Mesh(breastGeo, skinMat);
        rB.position.set(0.14, 1.25, 0.22);
        miku.add(lB, rB);
        chestParts.push(lB, rB);

        const nipGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.03, 12);
        const lNip = new THREE.Mesh(nipGeo, nippleMat);
        lNip.position.set(0, 0, 0.12); lNip.rotation.x = Math.PI / 2;
        lB.add(lNip);
        const rNip = new THREE.Mesh(nipGeo, nippleMat);
        rNip.position.set(0, 0, 0.12); rNip.rotation.x = Math.PI / 2;
        rB.add(rNip);
        nipples.push(lNip, rNip);

        const buttGeo = new THREE.SphereGeometry(0.16, 32, 32);
        const lP = new THREE.Mesh(buttGeo, skinMat);
        lP.position.set(-0.14, 0.7, -0.15);
        const rP = new THREE.Mesh(buttGeo, skinMat);
        rP.position.set(0.14, 0.7, -0.15);
        miku.add(lP, rP);
        buttParts.push(lP, rP);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.2, 0);

        // Загрузка сохраненных данных
        loadProgress();

        // UI ЛОГИКА
        document.getElementById('tChest').onclick = function() {
            activeChest = !activeChest; this.classList.toggle('active');
        };
        document.getElementById('tButt').onclick = function() {
            activeButt = !activeButt; this.classList.toggle('active');
        };

        document.getElementById('mainBtn').onclick = function() {
            if(activeChest) chestSize++;
            if(activeButt) buttSize++;

            updateVisuals();
            saveProgress(); // Сохраняем после каждого клика
        };

        document.getElementById('resetBtn').onclick = function() {
            if(confirm("Сбросить все размеры?")) {
                chestSize = 0;
                buttSize = 0;
                updateVisuals();
                saveProgress();
            }
        };
    }

    function createMilk() {
        const pGeo = new THREE.SphereGeometry(0.02, 6, 6);
        const pMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const targetNip = nipples[Math.floor(Math.random() * nipples.length)];
        const pos = new THREE.Vector3();
        targetNip.getWorldPosition(pos);

        const p = new THREE.Mesh(pGeo, pMat);
        p.position.copy(pos);
        const power = 0.05 + (chestSize * 0.005);
        p.userData = {
            v: new THREE.Vector3((Math.random()-0.5)*0.03, (Math.random()-0.1)*0.02, power)
        };
        scene.add(p);
        milkParticles.push(p);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (chestSize >= 30) createMilk();
        for (let i = milkParticles.length - 1; i >= 0; i--) {
            const p = milkParticles[i];
            p.position.add(p.userData.v);
            p.userData.v.y -= 0.0015;
            if (p.position.y < -1 || p.position.z > 5) {
                scene.remove(p);
                milkParticles.splice(i, 1);
            }
        }
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
