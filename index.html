<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Steal a Brainrot</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 140px;
            height: 140px;
            z-index: 10;
        }
        #jump-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            color: black;
            z-index: 10;
            user-select: none;
        }
        #jump-btn:active {
            background-color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <div id="joystick-zone"></div>
    <button id="jump-btn">JUMP</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // --- 1. БАЗОВАЯ НАСТРОЙКА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 20, 70); 

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; 
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true; 
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        // --- ГЕНЕРАТОРЫ ТЕКСТУР ---
        function createGrassTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#3a5f0b'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<8000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#4c7a11' : '#2d4a08';
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(30, 30);
            return tex;
        }

        function createConveyorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,256,256);
            ctx.fillStyle = '#aa0000';
            for(let i=-256; i<512; i+=64) {
                ctx.beginPath();
                ctx.moveTo(0, i); ctx.lineTo(256, i + 128);
                ctx.lineTo(256, i + 160); ctx.lineTo(0, i + 32);
                ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(1, 20);
            return tex;
        }

        // --- 2. СОЗДАНИЕ КАРТЫ И ОБЪЕКТОВ ---
        const mapSize = 80; 

        // Земля
        const floorGeo = new THREE.PlaneGeometry(mapSize, mapSize);
        const floorMat = new THREE.MeshStandardMaterial({ map: createGrassTexture(), roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true; 
        scene.add(floor);

        // Конвейер
        const conveyorWidth = 8;
        const conveyorGeo = new THREE.BoxGeometry(conveyorWidth, 0.5, mapSize);
        const conveyorTex = createConveyorTexture();
        const conveyorMat = new THREE.MeshStandardMaterial({ map: conveyorTex, roughness: 0.5 });
        const conveyor = new THREE.Mesh(conveyorGeo, conveyorMat);
        conveyor.position.set(0, 0.25, 0); 
        conveyor.receiveShadow = true;
        conveyor.castShadow = true;
        scene.add(conveyor);

        // Серые стены
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7 });
        const wallThickness = 2;
        const wallHeight = 6;

        function createWall(x, z, width, depth) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(width, wallHeight, depth), wallMat);
            wall.position.set(x, wallHeight / 2, z);
            wall.receiveShadow = true;
            wall.castShadow = true;
            scene.add(wall);
        }

        createWall(0, -mapSize/2, mapSize, wallThickness); 
        createWall(0, mapSize/2, mapSize, wallThickness);  
        createWall(-mapSize/2, 0, wallThickness, mapSize); 
        createWall(mapSize/2, 0, wallThickness, mapSize);  

        // --- НОВОЕ: БАЗЫ И СЛОТЫ ---
        // Массив для хранения данных о базах (пригодится позже)
        const gameBases = []; 

        function createBase(x, z, teamColor) {
            // 1. Сама бетонная площадка базы (очень тонкая, чтобы не мешать бегать)
            const baseWidth = 14;
            const baseDepth = 12;
            const baseHeight = 0.1;
            
            const baseGeo = new THREE.BoxGeometry(baseWidth, baseHeight, baseDepth);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.9 }); // Серый бетон
            const baseMesh = new THREE.Mesh(baseGeo, baseMat);
            baseMesh.position.set(x, baseHeight / 2, z);
            baseMesh.receiveShadow = true;
            scene.add(baseMesh);

            // Окантовка цветом команды (Синие слева, Красные справа)
            const borderGeo = new THREE.BoxGeometry(baseWidth + 0.4, baseHeight - 0.05, baseDepth + 0.4);
            const borderMat = new THREE.MeshBasicMaterial({ color: teamColor });
            const borderMesh = new THREE.Mesh(borderGeo, borderMat);
            borderMesh.position.set(x, baseHeight / 2 - 0.02, z);
            scene.add(borderMesh);

            // 2. Создаем 10 слотов (2 ряда по 5 штук)
            const slots = [];
            const slotSize = 1.5;
            const slotGeo = new THREE.PlaneGeometry(slotSize, slotSize);
            const slotMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                opacity: 0.4, 
                transparent: true 
            });

            // Математика для ровной расстановки сеткой 5x2
            const startX = x - (baseWidth / 2) + 2.5;
            const startZ = z - (baseDepth / 2) + 3.5;
            const spacingX = 2.2;
            const spacingZ = 5;

            for (let row = 0; row < 2; row++) {
                for (let col = 0; col < 5; col++) {
                    const slot = new THREE.Mesh(slotGeo, slotMat);
                    slot.rotation.x = -Math.PI / 2; // Кладем плашмя
                    // Поднимаем чуть-чуть выше базы, чтобы текстуры не мерцали
                    slot.position.set(startX + col * spacingX, baseHeight + 0.02, startZ + row * spacingZ);
                    scene.add(slot);
                    
                    // Сохраняем координаты слота для будущих "brainrot"
                    slots.push({
                        x: slot.position.x,
                        y: slot.position.y,
                        z: slot.position.z,
                        isOccupied: false
                    });
                }
            }

            // Записываем базу в память игры
            gameBases.push({ x, z, teamColor, slots });
        }

        // Расставляем 4 базы СЛЕВА (Синяя команда)
        createBase(-22, -30, 0x0055ff);
        createBase(-22, -10, 0x0055ff);
        createBase(-22, 10, 0x0055ff);
        createBase(-22, 30, 0x0055ff);

        // Расставляем 4 базы СПРАВА (Красная команда)
        createBase(22, -30, 0xff2200);
        createBase(22, -10, 0xff2200);
        createBase(22, 10, 0xff2200);
        createBase(22, 30, 0xff2200);


        // --- 3. ИГРОК И КАМЕРА ---
        const playerGeo = new THREE.BoxGeometry(1.2, 2.4, 1.2);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.3 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(10, 1.2, 20);
        player.castShadow = true; 
        scene.add(player);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 6, 28); 
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2 - 0.1; 
        controls.minDistance = 4; 
        controls.maxDistance = 15;

        let prevPlayerPos = player.position.clone();

        // --- 4. УПРАВЛЕНИЕ ---
        let moveVector = { x: 0, z: 0 };
        const speed = 0.25; 

        const joystickManager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '70px', bottom: '70px' },
            color: 'white'
        });

        joystickManager.on('move', (evt, data) => {
            const angle = data.angle.radian;
            const force = Math.min(data.force, 1);
            moveVector.x = Math.cos(angle) * force;
            moveVector.z = -Math.sin(angle) * force;
        });

        joystickManager.on('end', () => { moveVector = { x: 0, z: 0 }; });

        let velocityY = 0;
        let isGrounded = true;
        const gravity = -0.02;
        const jumpStrength = 0.4;

        const jumpAction = (e) => {
            e.preventDefault();
            if (isGrounded) {
                velocityY = jumpStrength;
                isGrounded = false;
            }
        };
        const jumpBtn = document.getElementById('jump-btn');
        jumpBtn.addEventListener('touchstart', jumpAction, {passive: false});
        jumpBtn.addEventListener('mousedown', jumpAction);

        // --- 5. ИГРОВОЙ ЦИКЛ ---
        const boundary = mapSize / 2 - wallThickness;

        function animate() {
            requestAnimationFrame(animate);

            conveyorTex.offset.y -= 0.02;

            if (moveVector.x !== 0 || moveVector.z !== 0) {
                const cameraAngle = Math.atan2(
                    camera.position.x - player.position.x,
                    camera.position.z - player.position.z
                );

                const moveX = moveVector.x * Math.cos(cameraAngle) + moveVector.z * Math.sin(cameraAngle);
                const moveZ = -moveVector.x * Math.sin(cameraAngle) + moveVector.z * Math.cos(cameraAngle);

                player.position.x += moveX * speed;
                player.position.z += moveZ * speed;
            }

            velocityY += gravity;
            player.position.y += velocityY;

            let groundLevel = 1.2; 
            
            if (Math.abs(player.position.x) < conveyorWidth / 2 + 0.6) {
                groundLevel = 1.2 + 0.5; 
            }

            if (player.position.y <= groundLevel) {
                player.position.y = groundLevel;
                velocityY = 0;
                isGrounded = true;
            }

            if (player.position.x > boundary) player.position.x = boundary;
            if (player.position.x < -boundary) player.position.x = -boundary;
            if (player.position.z > boundary) player.position.z = boundary;
            if (player.position.z < -boundary) player.position.z = -boundary;

            const deltaX = player.position.x - prevPlayerPos.x;
            const deltaY = player.position.y - prevPlayerPos.y;
            const deltaZ = player.position.z - prevPlayerPos.z;

            camera.position.x += deltaX;
            camera.position.y += deltaY;
            camera.position.z += deltaZ;

            controls.target.copy(player.position);
            controls.update();
            prevPlayerPos.copy(player.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
