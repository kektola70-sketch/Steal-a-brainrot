<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Steal a Brainrot</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: Arial, sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* UI Экономики и Инвентаря */
        #top-bar { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; gap: 10px; }
        .ui-box { background: rgba(0, 0, 0, 0.7); color: white; padding: 10px; border-radius: 8px; border: 2px solid white; font-weight: bold; }
        #money-txt { color: #00ff00; font-size: 20px; }
        
        /* Кнопки Магазина */
        #shop-btn { background: #ffaa00; color: black; border: 2px solid white; padding: 10px 20px; font-weight: bold; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #shop-panel { display: none; position: absolute; top: 60px; left: 10px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; border: 2px solid white; color: white; z-index: 20; }
        .shop-item { margin-bottom: 10px; border-bottom: 1px solid gray; padding-bottom: 10px; }
        .buy-item-btn { background: #00ff00; color: black; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* Управление */
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 140px; height: 140px; z-index: 10; }
        
        .action-btn { position: absolute; width: 60px; height: 60px; background: rgba(255, 255, 255, 0.5); border: 2px solid white; border-radius: 50%; font-size: 12px; font-weight: bold; color: black; z-index: 10; display: flex; justify-content: center; align-items: center; text-align: center; }
        .action-btn:active { background: rgba(255, 255, 255, 0.9); }
        
        #jump-btn { bottom: 30px; right: 20px; width: 70px; height: 70px; font-size: 14px;}
        #hit-btn { bottom: 110px; right: 20px; background: rgba(255, 0, 0, 0.5); color: white;}
        #trap-btn { bottom: 30px; right: 100px; }

        /* Состояние переноски */
        #carry-status { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); color: white; padding: 10px; border-radius: 8px; font-weight: bold; display: none; border: 2px solid white; z-index: 10; }

        /* Универсальная кнопка действий над объектом */
        #action-ui { position: absolute; display: none; width: 140px; height: 50px; background: rgba(0, 0, 0, 0.8); border: 2px solid white; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; text-align: center; line-height: 50px; transform: translate(-50%, -50%); z-index: 20; overflow: hidden; pointer-events: auto; }
        #action-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: rgba(0, 255, 0, 0.5); z-index: -1; }
        
        /* Экран заморозки */
        #freeze-screen { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,255,0.3); z-index: 50; justify-content: center; align-items: center; color: white; font-size: 40px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
    </style>
</head>
<body>
    <div id="freeze-screen">TRAPPED!</div>

    <div id="top-bar">
        <div class="ui-box">
            <span id="money-txt">0$</span><br>
            <span id="income-txt" style="font-size:12px; color:#ccc;">+0$/sec</span>
        </div>
        <button id="shop-btn">SHOP</button>
    </div>

    <div id="carry-status">CARRYING BRAINROT<br><span style="font-size: 12px">Take it to your base!</span></div>

    <div id="shop-panel">
        <h3>SHOP & INVENTORY</h3>
        <div class="shop-item">
            <b>Big Glove</b> - 500$<br>Knocks enemies further.<br>
            <button class="buy-item-btn" onclick="buyShopItem('big_glove', 500)">BUY</button>
        </div>
        <div class="shop-item">
            <b>Trap</b> - 100$<br>Freezes for 10s. (Max: 5)<br>
            <button class="buy-item-btn" onclick="buyShopItem('trap', 100)">BUY</button>
        </div>
        <hr>
        <p>Weapon: <span id="inv-weapon" style="color:yellow">Normal Glove</span></p>
        <p>Traps: <span id="inv-traps" style="color:yellow">0</span> / 5</p>
        <button onclick="document.getElementById('shop-panel').style.display='none'" style="margin-top:10px;">Close</button>
    </div>
    
    <div id="action-ui">
        <div id="action-progress"></div>
        <span id="action-text">ACTION</span>
    </div>

    <div id="joystick-zone"></div>
    <div id="trap-btn" class="action-btn">SET<br>TRAP</div>
    <div id="hit-btn" class="action-btn">HIT</div>
    <div id="jump-btn" class="action-btn">JUMP</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let money = 0; let incomePerSec = 0;
        let weapon = 'normal_glove'; let trapsCount = 0;
        let isFrozen = false;
        let carriedBrainrot = null; // Что мы сейчас несем
        
        function updateUI() {
            document.getElementById('money-txt').innerText = money + '$';
            document.getElementById('income-txt').innerText = '+' + incomePerSec + '$/sec';
            document.getElementById('inv-traps').innerText = trapsCount;
            document.getElementById('inv-weapon').innerText = weapon === 'big_glove' ? 'Big Glove' : 'Normal Glove';
        }
        setInterval(() => { if(!isFrozen) { money += incomePerSec; updateUI(); } }, 1000);

        document.getElementById('shop-btn').onclick = () => {
            const sp = document.getElementById('shop-panel');
            sp.style.display = sp.style.display === 'block' ? 'none' : 'block';
        };

        function buyShopItem(item, price) {
            if(money >= price) {
                if(item === 'trap' && trapsCount < 5) { money -= price; trapsCount++; }
                else if(item === 'big_glove' && weapon !== 'big_glove') { money -= price; weapon = 'big_glove'; buildPlayerModel(); } // Перерисовываем модель с большой перчаткой
                updateUI();
            }
        }

        // --- НАСТРОЙКА THREE.JS ---
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB); 
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true; document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(20, 40, 20); dirLight.castShadow = true; scene.add(dirLight);

        // Текстуры
        function createTex(color, dotColor, isConveyor) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
            ctx.fillStyle = color; ctx.fillRect(0,0,256,256);
            if(isConveyor) { ctx.fillStyle = dotColor; for(let i=-256; i<512; i+=64) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(256, i+128); ctx.lineTo(256, i+160); ctx.lineTo(0, i+32); ctx.fill(); } }
            else { for(let i=0; i<8000; i++) { ctx.fillStyle = Math.random() > 0.5 ? dotColor : color; ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2); } }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }
        
        const mapSize = 80; 
        const floorTex = createTex('#3a5f0b', '#4c7a11', false); floorTex.repeat.set(30, 30);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(mapSize, mapSize), new THREE.MeshStandardMaterial({ map: floorTex })); floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        const convTex = createTex('#222', '#aa0000', true); convTex.repeat.set(1, 20);
        const conveyor = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, mapSize), new THREE.MeshStandardMaterial({ map: convTex })); conveyor.position.set(0, 0.25, 0); conveyor.receiveShadow = true; scene.add(conveyor);

        // --- СОЗДАНИЕ ИГРОКА (НОВАЯ 3D МОДЕЛЬ) ---
        let player, stickMesh, gloveMesh;
        function buildPlayerModel() {
            if(player) scene.remove(player);
            player = new THREE.Group();
            const mBlue = new THREE.MeshStandardMaterial({color: 0x0055ff}); const mYellow = new THREE.MeshStandardMaterial({color: 0xffff00}); const mWood = new THREE.MeshStandardMaterial({color: 0x8b4513}); const mRed = new THREE.MeshStandardMaterial({color: 0xff0000});
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.6), mBlue); torso.position.y = 1.2;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), mYellow); head.position.y = 2.2;
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.4), mYellow); legL.position.set(-0.25, 0.3, 0);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.4), mYellow); legR.position.set(0.25, 0.3, 0);
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, 0.4), mYellow); armL.position.set(-0.7, 1.3, 0);
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, 0.4), mYellow); armR.position.set(0.7, 1.3, 0);

            // Оружие в правой руке
            stickMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.5), mWood);
            stickMesh.position.set(0, -0.5, 0.5); stickMesh.rotation.x = Math.PI/2;
            
            const gloveSize = weapon === 'big_glove' ? 0.6 : 0.3;
            gloveMesh = new THREE.Mesh(new THREE.SphereGeometry(gloveSize), mRed);
            gloveMesh.position.set(0, 0.8, 0); stickMesh.add(gloveMesh);
            armR.add(stickMesh);

            player.add(torso, head, legL, legR, armL, armR);
            player.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; }});
            player.position.set(10, 0, 20); scene.add(player);
        }
        buildPlayerModel();

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 6, 28); controls.enablePan = false; controls.maxPolarAngle = Math.PI / 2 - 0.1; 
        let prevPlayerPos = player.position.clone();

        // --- БАЗЫ ---
        const gameBases = [];
        let playerBaseIndex = Math.floor(Math.random() * 8); // Случайная база для игрока

        function createTextSprite(text, color, yOffset) {
            const can = document.createElement('canvas'); can.width = 512; can.height = 128; const ctx = can.getContext('2d');
            ctx.textAlign = 'center'; ctx.fillStyle = color; ctx.font = 'bold 40px Arial'; ctx.fillText(text, 256, 70);
            const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(can), transparent: true }));
            sp.position.y = yOffset; sp.scale.set(6, 1.5, 1); return sp;
        }

        function createBase(index, x, z, teamColor, facingRight) {
            const baseObj = { x, z, slots: [], owner: index === playerBaseIndex ? 'player' : 'bot', activeBrainrots: [] };
            
            const floor = new THREE.Mesh(new THREE.BoxGeometry(14, 0.1, 12), new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
            floor.position.set(x, 0.05, z); floor.receiveShadow = true; scene.add(floor);
            
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const roofMat = new THREE.MeshStandardMaterial({ color: teamColor });
            
            // Задняя стена
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 12), wallMat);
            backWall.position.set(facingRight ? x + 6.75 : x - 6.75, 2.5, z); scene.add(backWall);
            
            // Боковые стены
            const side1 = new THREE.Mesh(new THREE.BoxGeometry(14, 5, 0.5), wallMat); side1.position.set(x, 2.5, z - 5.75); scene.add(side1);
            const side2 = new THREE.Mesh(new THREE.BoxGeometry(14, 5, 0.5), wallMat); side2.position.set(x, 2.5, z + 5.75); scene.add(side2);

            // Крыша
            const roof = new THREE.Mesh(new THREE.BoxGeometry(14.5, 0.5, 12.5), roofMat); roof.position.set(x, 5.25, z); scene.add(roof);

            // Табличка
            const name = baseObj.owner === 'player' ? "MY BASE" : "BOT BASE";
            const color = baseObj.owner === 'player' ? "#00ff00" : "#ff4444";
            const sign = createTextSprite(name, color, 7); sign.position.x = x; sign.position.z = z; scene.add(sign);

            // Кнопка Лазера (Защита)
            const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.2), new THREE.MeshStandardMaterial({color: 0xffff00}));
            btn.position.set(facingRight ? x + 5 : x - 5, 0.1, z); scene.add(btn);
            baseObj.btnMesh = btn; baseObj.laserActive = false; baseObj.laserTimer = 0;
            
            // Лазерная стена (невидимая по умолчанию)
            const laser = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, 11), new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.5}));
            laser.position.set(facingRight ? x - 6.8 : x + 6.8, 2.5, z); laser.visible = false; scene.add(laser);
            baseObj.laserMesh = laser;

            // Слоты
            const startX = facingRight ? x + 4 : x - 4;
            const dir = facingRight ? -1 : 1;
            for (let row = 0; row < 2; row++) {
                for (let col = 0; col < 5; col++) {
                    baseObj.slots.push({
                        x: startX + (col * 2.2 * dir), y: 0.1, z: (z - 2.5) + (row * 5),
                        isOccupied: false, brMesh: null
                    });
                }
            }
            gameBases.push(baseObj);
        }

        // 4 слева (смотрят вправо), 4 справа (смотрят влево)
        createBase(0, -30, -30, 0x0055ff, true); createBase(1, -30, -10, 0x0055ff, true); createBase(2, -30, 10, 0x0055ff, true); createBase(3, -30, 30, 0x0055ff, true);
        createBase(4, 30, -30, 0xff2200, false); createBase(5, 30, -10, 0xff2200, false); createBase(6, 30, 10, 0xff2200, false); createBase(7, 30, 30, 0xff2200, false);

        // --- БРЕЙНРОТЫ ---
        const convBrainrots = [];
        
        function buildBrainrotModel(type) {
            const group = new THREE.Group();
            const mY=new THREE.MeshStandardMaterial({color:0xffff00}); const mG=new THREE.MeshStandardMaterial({color:0x00aa00});
            const mB=new THREE.MeshStandardMaterial({color:0x0055ff}); const mO=new THREE.MeshStandardMaterial({color:0xffa500});
            const mK=new THREE.MeshStandardMaterial({color:0x6b8e23}); const mGr=new THREE.MeshStandardMaterial({color:0x888888});
            const mBl=new THREE.MeshStandardMaterial({color:0x111111});

            if (type === 'noobini') {
                const legs=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.4),mB); legs.position.y=0.4;
                const torso=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.4),mG); torso.position.y=1.2;
                const head=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6),mY); head.position.y=1.9;
                const pizza=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,0.1,16),mO); pizza.position.y=2.25;
                group.add(legs,torso,head,pizza); group.typeData = { name:'Noobini', price:0, inc:1 };
            } else {
                const body=new THREE.Mesh(new THREE.SphereGeometry(0.7,16,16),mK); body.position.y=0.9; body.scale.set(1,1.1,1);
                const head=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.3,0.4),mGr); head.position.set(0,0.9,0.6);
                const mask=new THREE.Mesh(new THREE.BoxGeometry(0.42,0.12,0.1),mBl); mask.position.set(0,0.92,0.78);
                group.add(body,head,mask); group.typeData = { name:'Pipi Kiwi', price:100, inc:2 };
            }
            group.traverse(c=>{if(c.isMesh)c.castShadow=true;});
            return group;
        }

        setInterval(() => {
            const br = buildBrainrotModel(Math.random()>0.5 ? 'noobini' : 'pipikiwi');
            br.position.set((Math.random() - 0.5) * 4, 0.5, -mapSize/2); 
            scene.add(br); convBrainrots.push({ mesh: br, state: 'conveyor' });
        }, 3000);

        // Функция: Разместить Брейнрот на Базе
        function placeOnBase(br, base) {
            let slot = base.slots.find(s => !s.isOccupied);
            if(slot) {
                br.position.set(slot.x, slot.y, slot.z);
                slot.isOccupied = true; slot.brMesh = br;
                base.activeBrainrots.push(br);
                // Если это база игрока, увеличиваем доход
                if(base.owner === 'player') { incomePerSec += br.typeData.inc; updateUI(); }
            }
        }

        // --- УПРАВЛЕНИЕ, UI И ДЕЙСТВИЯ ---
        let moveVec = { x: 0, z: 0 };
        nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: { left: '70px', bottom: '70px' }, color: 'white' })
        .on('move', (e, d) => { moveVec.x = Math.cos(d.angle.radian)*Math.min(d.force,1); moveVec.z = -Math.sin(d.angle.radian)*Math.min(d.force,1); })
        .on('end', () => { moveVec = {x:0, z:0}; });

        let velY = 0; let isGnd = true;
        document.getElementById('jump-btn').ontouchstart = (e) => { e.preventDefault(); if(isGnd && !isFrozen){ velY = 0.4; isGnd = false; } };

        // Анимация удара
        let isHitting = false;
        document.getElementById('hit-btn').ontouchstart = (e) => {
            e.preventDefault();
            if(!isHitting && !isFrozen) {
                isHitting = true;
                let startRot = stickMesh.rotation.z;
                // Простая анимация кадрами
                let t = 0;
                let hitAnim = setInterval(() => {
                    t += 0.1;
                    stickMesh.rotation.z = startRot - Math.sin(t * Math.PI) * 1.5;
                    if(t >= 1) { clearInterval(hitAnim); stickMesh.rotation.z = startRot; isHitting = false; }
                }, 16);
            }
        };

        // Капканы
        const traps = [];
        document.getElementById('trap-btn').ontouchstart = (e) => {
            e.preventDefault();
            if(trapsCount > 0 && !isFrozen) {
                trapsCount--; updateUI();
                const trap = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.1), new THREE.MeshStandardMaterial({color: 0x333333}));
                trap.position.copy(player.position); trap.position.y = 0.1; scene.add(trap);
                traps.push(trap);
            }
        };

        // --- ЛОГИКА ВЗАИМОДЕЙСТВИЯ (КНОПКА ACTION) ---
        const actionUI = document.getElementById('action-ui');
        const actProg = document.getElementById('action-progress');
        const actText = document.getElementById('action-text');
        
        let targetObj = null; let actionType = ''; let holdStart = 0; let isHolding = false;

        function endAction() { isHolding = false; actProg.style.width = '0%'; }
        actionUI.ontouchstart = actionUI.onmousedown = (e) => { e.preventDefault(); if(targetObj && !isFrozen) { isHolding = true; holdStart = Date.now(); actText.innerText = 'WAIT...'; }};
        window.ontouchend = window.onmouseup = endAction;

        // --- ИГРОВОЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            if(isFrozen) return renderer.render(scene, camera); // Заморозка капканом

            convTex.offset.y -= 0.008;

            // Движение конвейера
            for (let i = convBrainrots.length - 1; i >= 0; i--) {
                const b = convBrainrots[i];
                if(b.state === 'conveyor') {
                    b.mesh.position.z += 0.08; 
                    if(b.mesh.position.z > mapSize/2) { scene.remove(b.mesh); convBrainrots.splice(i, 1); }
                }
            }

            // Поиск ближайшего объекта для взаимодействия
            let closest = null; let dist = 4; let type = '';

            if(!carriedBrainrot) { // Если руки пусты
                // 1. На конвейере (Покупка)
                convBrainrots.forEach(b => {
                    let d = player.position.distanceTo(b.mesh.position);
                    if(d < dist) { dist = d; closest = b; type = 'buy'; }
                });
                
                // 2. На базах (Продажа или Кража)
                gameBases.forEach(base => {
                    base.activeBrainrots.forEach(brMesh => {
                        let d = player.position.distanceTo(brMesh.position);
                        if(d < dist) { dist = d; closest = { mesh: brMesh, base: base }; type = base.owner === 'player' ? 'sell' : 'steal'; }
                    });
                });
            }

            // Показ интерфейса кнопки
            if (closest) {
                targetObj = closest; actionType = type;
                const pos = closest.mesh.position.clone(); pos.y += 2; pos.project(camera);
                if (pos.z < 1) {
                    actionUI.style.display = 'block';
                    actionUI.style.left = `${(pos.x*0.5+0.5)*window.innerWidth}px`; actionUI.style.top = `${(pos.y*-0.5+0.5)*window.innerHeight}px`;
                    if(!isHolding) {
                        if(type === 'buy') { actText.innerText = money >= closest.mesh.typeData.price ? `BUY ${closest.mesh.typeData.price}$` : 'NO MONEY'; actText.style.color = money >= closest.mesh.typeData.price ? 'white' : 'red'; }
                        if(type === 'sell') { actText.innerText = `SELL +${closest.mesh.typeData.price}$`; actText.style.color = 'yellow'; }
                        if(type === 'steal') { actText.innerText = `STEAL`; actText.style.color = 'red'; }
                    }
                } else { actionUI.style.display = 'none'; endAction(); }
            } else { targetObj = null; actionUI.style.display = 'none'; endAction(); }

            // Логика удержания (1 секунда = 1000мс)
            if (isHolding && targetObj) {
                let el = Date.now() - holdStart; actProg.style.width = `${Math.min((el/1000)*100, 100)}%`;
                if (el >= 1000) {
                    if (actionType === 'buy' && money >= targetObj.mesh.typeData.price) {
                        money -= targetObj.mesh.typeData.price; updateUI();
                        convBrainrots.splice(convBrainrots.indexOf(targetObj), 1);
                        placeOnBase(targetObj.mesh, gameBases[playerBaseIndex]);
                    } 
                    else if (actionType === 'sell') {
                        money += targetObj.mesh.typeData.price; incomePerSec -= targetObj.mesh.typeData.inc; updateUI();
                        scene.remove(targetObj.mesh); targetObj.base.activeBrainrots.splice(targetObj.base.activeBrainrots.indexOf(targetObj.mesh), 1);
                        let sl = targetObj.base.slots.find(s => s.brMesh === targetObj.mesh); if(sl) sl.isOccupied = false;
                    }
                    else if (actionType === 'steal') {
                        // Забираем в руки
                        carriedBrainrot = targetObj.mesh;
                        targetObj.base.activeBrainrots.splice(targetObj.base.activeBrainrots.indexOf(targetObj.mesh), 1);
                        let sl = targetObj.base.slots.find(s => s.brMesh === targetObj.mesh); if(sl) sl.isOccupied = false;
                        document.getElementById('carry-status').style.display = 'block';
                    }
                    targetObj = null; actionUI.style.display = 'none'; endAction();
                }
            }

            // Логика переноски
            if (carriedBrainrot) {
                // Висит над головой игрока
                carriedBrainrot.position.set(player.position.x, player.position.y + 3, player.position.z);
                
                // Проверка: Пришли ли мы на СВОЮ базу?
                let myB = gameBases[playerBaseIndex];
                if (player.position.distanceTo(new THREE.Vector3(myB.x, 0, myB.z)) < 7) {
                    placeOnBase(carriedBrainrot, myB);
                    carriedBrainrot = null; document.getElementById('carry-status').style.display = 'none';
                }
            }

            // Логика Баз (Кнопки и Лазеры)
            gameBases.forEach(base => {
                // Нажатие на кнопку
                if(player.position.distanceTo(base.btnMesh.position) < 1.5) {
                    base.laserActive = true; base.laserTimer = 30; // 30 секунд
                    base.btnMesh.position.y = 0.05; // Вдавлена
                }
                if(base.laserActive) {
                    base.laserMesh.visible = true;
                    // Ограничение движения для чужих лазеров (очень простая коллизия)
                    if(base.owner !== 'player') {
                        let laserBox = new THREE.Box3().setFromObject(base.laserMesh);
                        let playerBox = new THREE.Box3().setFromObject(player);
                        if(laserBox.intersectsBox(playerBox)) {
                            // Отталкиваем
                            player.position.z += (player.position.z > base.z ? 1 : -1) * 0.5;
                        }
                    }
                } else {
                    base.laserMesh.visible = false; base.btnMesh.position.y = 0.1; // Отжата
                }
            });

            // Таймер лазеров (каждый кадр отнимаем крохи, грубо говоря 60fps)
            gameBases.forEach(b => { if(b.laserTimer > 0) { b.laserTimer -= 1/60; if(b.laserTimer<=0) b.laserActive = false; }});

            // Логика Капканов
            traps.forEach((trap, i) => {
                if(player.position.distanceTo(trap.position) < 1) {
                    scene.remove(trap); traps.splice(i, 1);
                    isFrozen = true; document.getElementById('freeze-screen').style.display = 'flex';
                    setTimeout(() => { isFrozen = false; document.getElementById('freeze-screen').style.display = 'none'; }, 10000); // 10 сек
                }
            });

            // Физика игрока
            if (moveVec.x !== 0 || moveVec.z !== 0) {
                const ang = Math.atan2(camera.position.x - player.position.x, camera.position.z - player.position.z);
                player.position.x += (moveVec.x * Math.cos(ang) + moveVec.z * Math.sin(ang)) * 0.25;
                player.position.z += (-moveVec.x * Math.sin(ang) + moveVec.z * Math.cos(ang)) * 0.25;
                player.rotation.y = ang + Math.atan2(moveVec.x, moveVec.z); // Поворот модельки по ходу движения
            }
            velY -= 0.02; player.position.y += velY;
            if (player.position.y <= 0) { player.position.y = 0; velY = 0; isGnd = true; }

            // Камера
            camera.position.x += player.position.x - prevPlayerPos.x; camera.position.y += player.position.y - prevPlayerPos.y; camera.position.z += player.position.z - prevPlayerPos.z;
            controls.target.copy(player.position); controls.target.y += 1.5; controls.update(); prevPlayerPos.copy(player.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
