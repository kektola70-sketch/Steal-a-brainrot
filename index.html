<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Steal a Brainrot</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; }
        canvas { display: block; }
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 140px; height: 140px; z-index: 10; }
        #jump-btn {
            position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px;
            background-color: rgba(255, 255, 255, 0.5); border: 2px solid white; border-radius: 50%;
            font-size: 16px; font-weight: bold; color: black; z-index: 10; user-select: none;
        }
        #jump-btn:active { background-color: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body>

    <div id="joystick-zone"></div>
    <button id="jump-btn">JUMP</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // --- 1. БАЗОВАЯ НАСТРОЙКА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 20, 70); 

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true; 
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- ГЕНЕРАТОРЫ ТЕКСТУР ---
        function createGrassTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#3a5f0b'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<8000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#4c7a11' : '#2d4a08';
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(30, 30);
            return tex;
        }

        function createConveyorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,256,256);
            ctx.fillStyle = '#aa0000';
            for(let i=-256; i<512; i+=64) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(256, i + 128); ctx.lineTo(256, i + 160); ctx.lineTo(0, i + 32); ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(1, 20);
            return tex;
        }

        // --- 2. СОЗДАНИЕ КАРТЫ И ОБЪЕКТОВ ---
        const mapSize = 80; 

        // Земля
        const floorGeo = new THREE.PlaneGeometry(mapSize, mapSize);
        const floorMat = new THREE.MeshStandardMaterial({ map: createGrassTexture(), roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true; 
        scene.add(floor);

        // Конвейер
        const conveyorWidth = 8;
        const conveyorGeo = new THREE.BoxGeometry(conveyorWidth, 0.5, mapSize);
        const conveyorTex = createConveyorTexture();
        const conveyorMat = new THREE.MeshStandardMaterial({ map: conveyorTex, roughness: 0.5 });
        const conveyor = new THREE.Mesh(conveyorGeo, conveyorMat);
        conveyor.position.set(0, 0.25, 0); 
        conveyor.receiveShadow = true;
        conveyor.castShadow = true;
        scene.add(conveyor);

        // Базы
        const gameBases = []; 
        function createBase(x, z, teamColor) {
            const baseGeo = new THREE.BoxGeometry(14, 0.1, 12);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.9 });
            const baseMesh = new THREE.Mesh(baseGeo, baseMat);
            baseMesh.position.set(x, 0.05, z);
            baseMesh.receiveShadow = true;
            scene.add(baseMesh);

            const borderGeo = new THREE.BoxGeometry(14.4, 0.05, 12.4);
            const borderMat = new THREE.MeshBasicMaterial({ color: teamColor });
            const borderMesh = new THREE.Mesh(borderGeo, borderMat);
            borderMesh.position.set(x, 0.03, z);
            scene.add(borderMesh);

            const slots = [];
            const slotMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.4, transparent: true });
            const startX = x - 7 + 2.5;
            const startZ = z - 6 + 3.5;
            
            for (let row = 0; row < 2; row++) {
                for (let col = 0; col < 5; col++) {
                    const slot = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), slotMat);
                    slot.rotation.x = -Math.PI / 2; 
                    slot.position.set(startX + col * 2.2, 0.12, startZ + row * 5);
                    scene.add(slot);
                    slots.push({ x: slot.position.x, y: slot.position.y, z: slot.position.z, isOccupied: false });
                }
            }
            gameBases.push({ x, z, teamColor, slots });
        }

        // Базы (4 Синих слева, 4 Красных справа)
        createBase(-22, -30, 0x0055ff); createBase(-22, -10, 0x0055ff);
        createBase(-22, 10, 0x0055ff);  createBase(-22, 30, 0x0055ff);
        createBase(22, -30, 0xff2200);  createBase(22, -10, 0xff2200);
        createBase(22, 10, 0xff2200);   createBase(22, 30, 0xff2200);

        // --- 3. ИГРОК ---
        const player = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.4, 1.2), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
        player.position.set(10, 1.2, 20);
        player.castShadow = true; 
        scene.add(player);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 6, 28); 
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2 - 0.1; 

        let prevPlayerPos = player.position.clone();

        // --- НОВОЕ: СИСТЕМА BRAINROTS ---
        const activeBrainrots = [];
        
        // Функция для создания "Летающего Текста" (Спрайт)
        function createTextLabel(name, rarityText) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Настройка текста
            ctx.textAlign = 'center';
            // Имя (Белое)
            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px Arial';
            ctx.fillText(name, 256, 50);
            
            // Редкость (Серая, так как все Common)
            ctx.fillStyle = '#cccccc';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(`[ ${rarityText} ]`, 256, 90);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(4, 1, 1); // Размер текста в 3D мире
            return sprite;
        }

        // Фабрика по созданию самих моделей
        function buildBrainrotModel(type) {
            const group = new THREE.Group();
            
            // Стандартные материалы
            const matYellow = new THREE.MeshStandardMaterial({color: 0xffff00});
            const matGreen = new THREE.MeshStandardMaterial({color: 0x00aa00});
            const matBlue = new THREE.MeshStandardMaterial({color: 0x0000ff});
            const matWhite = new THREE.MeshStandardMaterial({color: 0xffffff});
            const matBlack = new THREE.MeshStandardMaterial({color: 0x222222});
            const matRed = new THREE.MeshStandardMaterial({color: 0xff0000});
            const matSkin = new THREE.MeshStandardMaterial({color: 0xffccaa});
            const matPurple = new THREE.MeshStandardMaterial({color: 0x800080});
            const matCyan = new THREE.MeshStandardMaterial({color: 0x00ffff});
            const matOrange = new THREE.MeshStandardMaterial({color: 0xffa500});

            if (type === 'noobini') {
                // Noobini pizanini (Роблокс Нуб + Пицца)
                const legs = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.4), matBlue);
                legs.position.y = 0.4;
                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.4), matGreen);
                torso.position.y = 1.2;
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matYellow);
                head.position.y = 1.9;
                const pizza = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.1, 16), matOrange);
                pizza.position.y = 2.25;
                group.add(legs, torso, head, pizza);
                group.nameText = 'Noobini pizanini';
            } 
            else if (type === 'skibidi') {
                // Skibidi Toilet
                const base = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 1.2), matWhite);
                base.position.y = 0.3;
                const tank = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), matWhite);
                tank.position.set(0, 0.9, -0.4);
                const bowl = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.5, 16), matWhite);
                bowl.position.set(0, 0.85, 0.2);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), matSkin);
                head.position.set(0, 1.2, 0.2);
                group.add(base, tank, bowl, head);
                group.nameText = 'Skibidi Toilet';
            }
            else if (type === 'grimace') {
                // Grimace Shake
                const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 1.2, 16), matPurple);
                cup.position.y = 0.6;
                const straw = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6), matWhite);
                straw.position.set(0.2, 1.4, 0);
                straw.rotation.z = -0.3;
                group.add(cup, straw);
                group.nameText = 'Grimace Shake';
            }
            else if (type === 'maxwell') {
                // Maxwell Cat (Буханка)
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 1.2), matBlack);
                body.position.y = 0.3;
                const face = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.4), matWhite);
                face.position.set(0, 0.4, 0.61); // Лицо спереди
                const ear1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.1), matBlack);
                ear1.position.set(-0.3, 0.7, 0.5);
                const ear2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.1), matBlack);
                ear2.position.set(0.3, 0.7, 0.5);
                group.add(body, face, ear1, ear2);
                group.nameText = 'Maxwell Cat';
            }
            else if (type === 'imposter') {
                // Sus Imposter
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16), matRed);
                body.position.y = 0.6;
                const visor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.2), matCyan);
                visor.position.set(0, 0.8, 0.4);
                const backpack = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.3), matRed);
                backpack.position.set(0, 0.6, -0.4);
                group.add(body, visor, backpack);
                group.nameText = 'Sus Imposter';
            }

            // Включаем тени для всех частей
            group.traverse(child => { if(child.isMesh) child.castShadow = true; });

            // Добавляем текст над моделью
            const label = createTextLabel(group.nameText, "Common");
            label.position.set(0, 2.8, 0); // Высота текста над объектом
            group.add(label);

            return group;
        }

        function spawnBrainrot() {
            const types = ['noobini', 'skibidi', 'grimace', 'maxwell', 'imposter'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            
            const brainrot = buildBrainrotModel(randomType);
            
            // Ставим его в самое начало конвейера (Север)
            // По X: случайный сдвиг влево-вправо, чтобы они не ехали ровно гуськом
            const randomX = (Math.random() - 0.5) * 4; 
            brainrot.position.set(randomX, 0.5, -mapSize/2); 
            
            scene.add(brainrot);
            activeBrainrots.push(brainrot);
        }

        // Спавним новый брейнрот каждые 3 секунды
        setInterval(spawnBrainrot, 3000);

        // --- 4. УПРАВЛЕНИЕ ---
        let moveVector = { x: 0, z: 0 };
        const joystickManager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static', position: { left: '70px', bottom: '70px' }, color: 'white'
        });
        joystickManager.on('move', (evt, data) => {
            const force = Math.min(data.force, 1);
            moveVector.x = Math.cos(data.angle.radian) * force;
            moveVector.z = -Math.sin(data.angle.radian) * force;
        });
        joystickManager.on('end', () => { moveVector = { x: 0, z: 0 }; });

        let velocityY = 0; let isGrounded = true;
        const jumpAction = (e) => {
            e.preventDefault();
            if (isGrounded) { velocityY = 0.4; isGrounded = false; }
        };
        const jumpBtn = document.getElementById('jump-btn');
        jumpBtn.addEventListener('touchstart', jumpAction, {passive: false});
        jumpBtn.addEventListener('mousedown', jumpAction);

        // --- 5. ИГРОВОЙ ЦИКЛ ---
        const speed = 0.25; 
        const boundary = mapSize / 2 - 2;

        function animate() {
            requestAnimationFrame(animate);

            // Анимация конвейера
            conveyorTex.offset.y -= 0.02;

            // ДВИЖЕНИЕ БРЕЙНРОТОВ по конвейеру
            const conveyorSpeed = 0.15; // Скорость движения предметов
            for (let i = activeBrainrots.length - 1; i >= 0; i--) {
                const br = activeBrainrots[i];
                br.position.z += conveyorSpeed; // Двигаем на юг

                // Если доехал до конца карты - удаляем, чтобы не лагало
                if (br.position.z > mapSize/2) {
                    scene.remove(br);
                    activeBrainrots.splice(i, 1);
                }
            }

            // Движение игрока
            if (moveVector.x !== 0 || moveVector.z !== 0) {
                const cameraAngle = Math.atan2(camera.position.x - player.position.x, camera.position.z - player.position.z);
                player.position.x += (moveVector.x * Math.cos(cameraAngle) + moveVector.z * Math.sin(cameraAngle)) * speed;
                player.position.z += (-moveVector.x * Math.sin(cameraAngle) + moveVector.z * Math.cos(cameraAngle)) * speed;
            }

            // Гравитация игрока
            velocityY += -0.02; player.position.y += velocityY;
            let groundLevel = Math.abs(player.position.x) < 4.6 ? 1.7 : 1.2; 
            if (player.position.y <= groundLevel) { player.position.y = groundLevel; velocityY = 0; isGrounded = true; }

            // Ограничения карты
            if (player.position.x > boundary) player.position.x = boundary;
            if (player.position.x < -boundary) player.position.x = -boundary;
            if (player.position.z > boundary) player.position.z = boundary;
            if (player.position.z < -boundary) player.position.z = -boundary;

            // Следование камеры
            camera.position.x += player.position.x - prevPlayerPos.x;
            camera.position.y += player.position.y - prevPlayerPos.y;
            camera.position.z += player.position.z - prevPlayerPos.z;
            controls.target.copy(player.position);
            controls.update();
            prevPlayerPos.copy(player.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
